	<!-- Login Functionality -->
	<script>
		// 我寫的

		// 1. 取得 DOM 元素
		const loginBtn = document.getElementById("loginBtn"); // 登入按鈕
		const loginBtnText = loginBtn.innerText; // 登入按鈕預設文字
		const loginUserId = document.getElementById("loginUserId"); // ID欄
		const loginEmail = document.getElementById("loginEmail"); // 帳號/信箱欄
		const loginPassword = document.getElementById("loginPassword"); // 密碼欄
		const togglePassword = document.getElementById("togglePassword"); // 密碼眼睛icon

		// 2. 登入按鈕點擊事件驗證
		const checkLogin =  function() {
			// ID有沒有填
			const userId = loginUserId.value;
			if (!userId) {
				alert("請輸入使用者ID");
				loginUserId.focus();
				return;
			}
			// 帳號/信箱有沒有填
			const userEmail = loginEmail.value;
			if (!userEmail) {
				alert("請輸入帳號或Email");
				loginEmail.focus();
				return;
			}			
			// 信箱格式對不對
			const emailRegex = /^.+@.+\..{2,3}$/;
			if (!emailRegex.test(userEmail)) {
				alert("無效的帳號或Email格式");
				loginEmail.focus();
				return;
			}
			// 密碼有沒有填
			const userPwd = loginPassword.value;
			if (!userPwd) {
				alert("請輸入密碼");
				loginPassword.focus();
				return;
			}

			// 在驗證使用者期間，鎖定登入按鈕 (登入 -> 登入中...)
			loginBtn.disabled = true;
			loginBtn.innerText = "登入中...";
			// 帳密是否存在
			setTimeout(
				function() {
					const isUserValid = validateLogin(userId, userPwd);
					if (!isUserValid) {
						alert("使用者ID或密碼有誤");
						loginBtn.disabled = false;
						loginBtn.innerText = loginBtnText;
						loginPassword.focus();
						return;
					}
					// 3-1. sessionStorage 狀態管理
					sessionStorage.setItem("userId",userId);
					sessionStorage.setItem("userEmail",userEmail);
					sessionStorage.setItem("isLoggedIn",true);
					// 導向首頁
					// alert("登入成功");
					location.href = "home.html";
				},
				1000);

		};
		loginBtn.addEventListener("click",checkLogin)

		// 3-2. 自動填寫 ID & 帳號
		const currentUserId = sessionStorage.getItem("userId");
		const currentUserEmail = sessionStorage.getItem("userEmail");
		if (currentUserId) {
			loginUserId.value = currentUserId;
			loginEmail.value = currentUserEmail;
		}
		
		// 我寫的

		// 內建
		// 模擬登入驗證函數
		function validateLogin(userId, password) {
			// 這裡可以替換為真實的API驗證
			// 目前使用簡單的模擬驗證
			const validCredentials = [
				{ userId: '1', password: '123456' },
				{ userId: '2', password: '123456' },
				{ userId: '3', password: '123456' },
				{ userId: '4', password: '123456' },
				{ userId: '5', password: '123456' },
				{ userId: '6', password: '123456' },
				{ userId: '7', password: '123456' },
				{ userId: '8', password: '123456' },
				{ userId: '9', password: '123456' },
				{ userId: '10', password: '123456' }
			];

			// some() 是 陣列（Array）的方法，用來測試陣列中是否「至少有一個元素」符合條件。
			// 只要找到一個符合條件的元素，它就會立刻回傳 true；若全部都不符合，則回傳 false。
			// array.some(callback(element))
			// element 陣列中的每個元素
			return validCredentials.some(cred =>
				// console.log(cred); // 一個個印出陣列裡的物件
				cred.userId === userId && cred.password === password
			);
		}
	</script>
